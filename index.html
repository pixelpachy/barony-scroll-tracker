<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barony Scroll Tracker</title>
  <style>
    :root {
      --bg:      #0e0c0a;
      --surface: #1a1612;
      --border:  #3a2e1e;
      --accent:  #c8922a;
      --dim:     #7a5318;
      --text:    #d8c9a3;
      --muted:   #7a6e5a;
      --danger:  #8b2020;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */

    header {
      text-align: center;
      padding: 0.65rem 1rem 0.55rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(200,146,42,0.35);
    }

    header p {
      color: var(--muted);
      margin-top: 0.15rem;
      font-style: italic;
      font-size: 0.76rem;
    }

    /* ── Body layout: sidebar + main ───────────────────────────────────────── */

    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────────── */

    .sidebar {
      width: 148px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0.6rem 0.5rem;
      gap: 0.3rem;
      overflow-y: auto;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 0.35rem 0.3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.1rem;
      flex-shrink: 0;
    }

    .slot-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 0.35rem 0.45rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .slot-item:hover { border-color: var(--border); background: var(--surface); }

    .slot-item.active {
      border-color: var(--accent);
      background: #231d12;
    }

    .slot-item .slot-name {
      flex: 1;
      font-size: 0.78rem;
      color: var(--muted);
      background: transparent;
      border: none;
      outline: none;
      font-family: Georgia, serif;
      cursor: pointer;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .slot-item.active .slot-name { color: var(--accent); }

    .slot-item .slot-name:focus {
      border-bottom: 1px solid var(--dim);
      cursor: text;
    }

    .slot-item .slot-delete {
      font-size: 0.65rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .slot-item:hover .slot-delete,
    .slot-item.active .slot-delete { opacity: 1; }
    .slot-item .slot-delete:hover { color: #e07070; }

    .slot-add {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 0.32rem 0.45rem;
      color: var(--muted);
      font-size: 0.75rem;
      font-family: Georgia, serif;
      cursor: pointer;
      text-align: left;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }

    .slot-add:hover { border-color: var(--dim); color: var(--text); }
    .slot-add:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Main content ──────────────────────────────────────────────────────── */

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 0.6rem 0.75rem 0.6rem 0.8rem;
    }

    /* ── Stats bar ─────────────────────────────────────────────────────────── */

    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      flex-shrink: 0;
    }

    .stats-bar .label { color: var(--muted); font-style: italic; }
    .stats-bar .label span { color: var(--accent); font-style: normal; }

    .btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.28rem 0.75rem;
      font-family: Georgia, serif;
      font-size: 0.76rem;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.04em;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn:hover { color: #e07070; border-color: var(--danger); }

    /* ── Scroll list ───────────────────────────────────────────────────────── */

    .scroll-list {
      display: flex;
      flex-direction: column;
      gap: 0.32rem;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      padding-right: 0.2rem;
    }

    .scroll-list::-webkit-scrollbar { width: 6px; }
    .scroll-list::-webkit-scrollbar-track { background: transparent; }
    .scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .scroll-entry {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 0.7rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.4rem 0.85rem;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    .scroll-entry:hover { border-color: var(--dim); }

    .scroll-name {
      font-size: 0.84rem;
      letter-spacing: 0.06em;
      color: var(--text);
      text-transform: uppercase;
    }

    .scroll-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.26rem 0.5rem;
      font-family: Georgia, serif;
      font-size: 0.78rem;
      border-radius: 3px;
      cursor: pointer;
      min-width: 195px;
      outline: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .scroll-select:focus { border-color: var(--dim); }
    .scroll-select.is-known  { color: #7dd4a8; border-color: #2a5a3e; }
    .scroll-select.is-danger { color: #e07070; border-color: #6b2020; }

    /* ── Toast ─────────────────────────────────────────────────────────────── */

    #toast {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface);
      border: 1px solid var(--dim);
      color: var(--text);
      padding: 0.4rem 1.2rem;
      border-radius: 4px;
      font-size: 0.84rem;
      transition: transform 0.25s ease;
      pointer-events: none;
      z-index: 99;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>&#x2726; Barony Scroll Tracker &#x2726;</h1>
  <p>Identify each scroll name's effect for your current seed</p>
</header>

<div class="layout">

  <!-- Sidebar: seed slots -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Seeds</div>
    <!-- slots rendered by JS -->
  </nav>

  <!-- Main: scroll list -->
  <div class="main">
    <div class="stats-bar">
      <span class="label">
        <span id="knownCount">0</span> of <span id="totalCount">0</span> identified
      </span>
      <button class="btn" id="resetBtn">Reset Seed</button>
    </div>
    <div class="scroll-list" id="scrollList"></div>
  </div>

</div>

<div id="toast"></div>

<script>
  // ── Constants ──────────────────────────────────────────────────────────────

  const SCROLL_NAMES = [
    "ZELGO MER", "JUYED AWK YACC", "NR 9", "NOBARY ROBYAN", "PRATYAVAYAH",
    "DAIYEN FOOELS", "LEP GEX VEN ZEA", "PRIRUTSENIE", "ELBIB YLOH",
    "VERR YED HORRE", "VENZAR BORGAVVE", "THARR", "YUM YUM", "KERNOD WEL",
    "ELAM EBOW", "DUAM XNAHT", "ANDOVA BEGARIN", "KIRJE", "VE FORBRYDERNE",
    "HACKEM MUCHE", "VELOX NEB", "FOOBIE BLETCH", "TEMOV", "GARVEN DEH", "READ ME",
  ];

  const EFFECTS = [
    { value: "",               label: "— Unknown —"                        },
    { value: "food",           label: "Scroll of Food"                     },
    { value: "identify",       label: "Scroll of Identify"                 },
    { value: "light",          label: "Scroll of Light"                    },
    { value: "teleportation",  label: "Scroll of Teleportation"            },
    { value: "fire",           label: "Scroll of Fire",      danger: true  },
    { value: "enchant_armor",  label: "Scroll of Enchant Armor"            },
    { value: "enchant_weapon", label: "Scroll of Enchant Weapon"           },
    { value: "remove_curse",   label: "Scroll of Remove Curse"             },
    { value: "repair",         label: "Scroll of Repair"                   },
    { value: "destroy_armor",  label: "Scroll of Destroy Armor", danger: true },
    { value: "magic_mapping",  label: "Scroll of Magic Mapping"            },
    { value: "summon",         label: "Scroll of Summon"                   },
    { value: "conjure_arrow",  label: "Scroll of Conjure Arrow"            },
    { value: "blank",          label: "Blank Scroll"                       },
    { value: "mail",           label: "Piece of Mail"                      },
  ];

  const DANGER_EFFECTS = new Set(EFFECTS.filter(e => e.danger).map(e => e.value));
  const MAX_SLOTS = 10;
  const STORAGE_KEY = "barony-v3";

  // ── Storage ────────────────────────────────────────────────────────────────

  function loadStore() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (raw && Array.isArray(raw.slots) && raw.slots.length) return raw;
    } catch {}
    const first = makeSlot("Seed 1");
    return { activeId: first.id, slots: [first] };
  }

  function saveStore() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
  }

  function makeSlot(name) {
    return { id: crypto.randomUUID(), name, data: {} };
  }

  let store = loadStore();

  function activeSlot() {
    return store.slots.find(s => s.id === store.activeId) || store.slots[0];
  }

  // ── Sidebar rendering ──────────────────────────────────────────────────────

  function renderSidebar() {
    const sidebar = document.getElementById("sidebar");
    // Remove all slot items and the add button (keep the label)
    [...sidebar.querySelectorAll(".slot-item, .slot-add")].forEach(el => el.remove());

    store.slots.forEach(slot => {
      const item = document.createElement("div");
      item.className = "slot-item" + (slot.id === store.activeId ? " active" : "");

      const nameInput = document.createElement("input");
      nameInput.className = "slot-name";
      nameInput.value = slot.name;
      nameInput.maxLength = 20;
      nameInput.title = "Click to rename";
      nameInput.setAttribute("aria-label", "Slot name");

      nameInput.addEventListener("mousedown", e => {
        if (slot.id !== store.activeId) {
          e.preventDefault();
          switchSlot(slot.id);
        }
      });

      nameInput.addEventListener("change", () => {
        slot.name = nameInput.value.trim() || slot.name;
        nameInput.value = slot.name;
        saveStore();
      });

      nameInput.addEventListener("keydown", e => {
        if (e.key === "Enter") nameInput.blur();
      });

      const del = document.createElement("button");
      del.className = "slot-delete";
      del.textContent = "✕";
      del.title = "Delete slot";
      del.setAttribute("aria-label", `Delete ${slot.name}`);
      del.addEventListener("click", e => {
        e.stopPropagation();
        deleteSlot(slot.id);
      });

      item.appendChild(nameInput);
      if (store.slots.length > 1) item.appendChild(del);
      sidebar.appendChild(item);
    });

    const addBtn = document.createElement("button");
    addBtn.className = "slot-add";
    addBtn.textContent = "+ New Seed";
    addBtn.disabled = store.slots.length >= MAX_SLOTS;
    addBtn.title = store.slots.length >= MAX_SLOTS
      ? `Maximum ${MAX_SLOTS} slots reached`
      : "Add seed slot";
    addBtn.addEventListener("click", addSlot);
    sidebar.appendChild(addBtn);
  }

  function switchSlot(id) {
    store.activeId = id;
    saveStore();
    renderSidebar();
    renderScrollList();
  }

  function addSlot() {
    if (store.slots.length >= MAX_SLOTS) return;
    const slot = makeSlot(`Seed ${store.slots.length + 1}`);
    store.slots.push(slot);
    store.activeId = slot.id;
    saveStore();
    renderSidebar();
    renderScrollList();
  }

  function deleteSlot(id) {
    if (store.slots.length === 1) return;
    const slot = store.slots.find(s => s.id === id);
    if (!confirm(`Delete slot "${slot.name}"? This cannot be undone.`)) return;
    store.slots = store.slots.filter(s => s.id !== id);
    if (store.activeId === id) store.activeId = store.slots[0].id;
    saveStore();
    renderSidebar();
    renderScrollList();
  }

  // ── Scroll list rendering ──────────────────────────────────────────────────

  function updateStats() {
    const slot = activeSlot();
    const known = SCROLL_NAMES.filter(n => slot.data[n]).length;
    document.getElementById("knownCount").textContent = known;
    document.getElementById("totalCount").textContent = SCROLL_NAMES.length;
  }

  function styleSelect(select, value) {
    select.classList.remove("is-known", "is-danger");
    if (value && DANGER_EFFECTS.has(value)) select.classList.add("is-danger");
    else if (value) select.classList.add("is-known");
  }

  function renderScrollList() {
    const slot = activeSlot();
    const list = document.getElementById("scrollList");
    list.innerHTML = "";

    SCROLL_NAMES.forEach(name => {
      const entry = document.createElement("div");
      entry.className = "scroll-entry";

      const nameEl = document.createElement("div");
      nameEl.className = "scroll-name";
      nameEl.textContent = name;

      const select = document.createElement("select");
      select.className = "scroll-select";
      select.setAttribute("aria-label", name);

      EFFECTS.forEach(eff => {
        const opt = document.createElement("option");
        opt.value = eff.value;
        opt.textContent = eff.label;
        if (eff.value === (slot.data[name] || "")) opt.selected = true;
        select.appendChild(opt);
      });

      styleSelect(select, slot.data[name] || "");

      select.addEventListener("change", () => {
        slot.data[name] = select.value;
        saveStore();
        styleSelect(select, select.value);
        updateStats();
      });

      entry.appendChild(nameEl);
      entry.appendChild(select);
      list.appendChild(entry);
    });

    updateStats();
  }

  // ── Reset ──────────────────────────────────────────────────────────────────

  document.getElementById("resetBtn").addEventListener("click", () => {
    const slot = activeSlot();
    if (!confirm(`Reset all identifications for "${slot.name}"?`)) return;
    slot.data = {};
    saveStore();
    renderScrollList();
    showToast(`"${slot.name}" reset.`);
  });

  // ── Toast ──────────────────────────────────────────────────────────────────

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  renderSidebar();
  renderScrollList();
</script>
</body>
</html>
